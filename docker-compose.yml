services:
  app:
    build: .
    container_name: article-api
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - db_data:/app/data
      - certs:/app/nginx/certs

  nginx:
    image: nginx:alpine
    container_name: article-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - certs:/etc/nginx/certs
    depends_on:
      - app

volumes:
  certs:
  db_data: